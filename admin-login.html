<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicGear - Admin Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script defer src="js/script.js"></script>
</head>
<body>
    <!-- Admin Login Section -->
    <section class="admin-login-section">
        <div class="container">
            <div class="admin-login-card">
                <h2><i class="fas fa-user-shield"></i> Admin Login</h2>
                <form id="admin-login-form">
                    <div class="form-group">
                        <input type="email" id="admin-email" placeholder="Admin Email" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="admin-password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn primary">Login as Admin</button>
                </form>
            </div>
        </div>
    </section>

    <script>
        document.getElementById('admin-login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('admin-email').value.trim();
            const password = document.getElementById('admin-password').value.trim();
            if (email === 'admin@musicgear.com' && password === 'admin123') {
                localStorage.setItem('musicgear_current_user', JSON.stringify({ name: 'Admin', email: 'admin@musicgear.com', isAdmin: true }));
                window.location.href = 'admin-dashboard.html';
            } else {
                alert('Invalid admin credentials');
            }
        });
    </script>
</body>
</html>
